<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | Luxe Beauty</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#ffe6f2,#fff0f6,#ffd6e8);
      min-height:100vh;
      padding:40px 15px;
      display:flex;
      justify-content:center;
    }

    .orders-container{
      width:100%;
      max-width:1100px;
      background:#fff;
      border-radius:25px;
      box-shadow:0 10px 35px rgba(255,105,180,0.25);
      padding:35px 30px;
    }

    .orders-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .orders-header h2{
      color:#3a0f2e;
    }

    .orders-header a{
      text-decoration:none;
      color:#ff69b4;
      font-weight:600;
      font-size:14px;
    }

    .orders-header a:hover{
      text-decoration:underline;
    }

    .order-card{
      border:1px solid #ffd6e8;
      border-radius:18px;
      padding:20px 22px;
      margin-bottom:18px;
      background:#fff7fb;
    }

    .order-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:12px;
      font-size:14px;
      font-weight:600;
    }

    .status{
      padding:4px 10px;
      border-radius:12px;
      font-size:12px;
      color:#fff;
    }

    .delivered{ background:#28a745; }
    .pending{ background:#ffc107; color:#000; }
    .cancelled{ background:#dc3545; }

    .order-details{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:15px;
      font-size:14px;
      color:#555;
    }

    .order-details span{
      font-weight:600;
      color:#333;
    }

    .order-actions{
      margin-top:15px;
      display:flex;
      gap:10px;
    }

    .order-actions button{
      padding:8px 14px;
      border:none;
      border-radius:15px;
      font-size:13px;
      cursor:pointer;
      font-weight:600;
    }

    .btn-view{
      background:#ff69b4;
      color:#fff;
    }

    .btn-invoice{
      background:#fff;
      border:1px solid #ff69b4;
      color:#ff69b4;
    }

    .btn-view:hover{ background:#e0559f; }
    .btn-invoice:hover{ background:#ffe6f2; }

    @media(max-width:800px){
      .order-details{
        grid-template-columns:1fr;
      }
      .orders-header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }
    }

  </style>
</head>
<body>

  <div class="orders-container">

    <div class="orders-header">
      <h2>My Orders</h2>
      <a href="checkout.html">+ New Order</a>
    </div>

    <!-- Order 1 -->
    <div class="order-card">

      <div class="order-top">
        <div>Order #LB10234</div>
        <div class="status delivered">Delivered</div>
      </div>

      <div class="order-details">
        <div><span>Date:</span> 05 Feb 2026</div>
        <div><span>Total:</span> $70</div>
        <div><span>Payment:</span> Credit Card</div>
      </div>

      <div class="order-actions">
        <button class="btn-view">View Details</button>
        <button class="btn-invoice">Download Invoice</button>
      </div>

    </div>

    <!-- Order 2 -->
    <div class="order-card">

      <div class="order-top">
        <div>Order #LB10218</div>
        <div class="status pending">Pending</div>
      </div>

      <div class="order-details">
        <div><span>Date:</span> 01 Feb 2026</div>
        <div><span>Total:</span> $45</div>
        <div><span>Payment:</span> Cash on Delivery</div>
      </div>

      <div class="order-actions">
        <button class="btn-view">View Details</button>
        <button class="btn-invoice">Download Invoice</button>
      </div>

    </div>

    <!-- Order 3 -->
    <div class="order-card">

      <div class="order-top">
        <div>Order #LB10192</div>
        <div class="status cancelled">Cancelled</div>
      </div>

      <div class="order-details">
        <div><span>Date:</span> 27 Jan 2026</div>
        <div><span>Total:</span> $30</div>
        <div><span>Payment:</span> PayPal</div>
      </div>

      <div class="order-actions">
        <button class="btn-view">View Details</button>
        <button class="btn-invoice">Download Invoice</button>
      </div>

    </div>

  </div>

</body>
</html>
