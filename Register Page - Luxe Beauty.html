<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Luxe Beauty</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#ffe6f2,#fff0f6,#ffd6e8);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .register-box{
      background:#fff;
      padding:40px 35px;
      width:100%;
      max-width:420px;
      border-radius:25px;
      box-shadow:0 10px 35px rgba(255,105,180,0.25);
      text-align:center;
    }

    .register-box h2{
      margin-bottom:10px;
      color:#3a0f2e;
    }

    .register-box p{
      font-size:14px;
      color:#666;
      margin-bottom:25px;
    }

    .form-group{
      text-align:left;
      margin-bottom:18px;
    }

    .form-group label{
      font-size:13px;
      font-weight:600;
      color:#444;
    }

    .form-group input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid #ffc1dc;
      outline:none;
      font-size:14px;
    }

    .form-group input:focus{
      border-color:#ff69b4;
      box-shadow:0 0 5px rgba(255,105,180,0.4);
    }

    .btn-register{
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#ff69b4;
      border:none;
      border-radius:25px;
      font-weight:600;
      color:#fff;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .btn-register:hover{
      background:#e0559f;
    }

    .login-link{
      margin-top:20px;
      font-size:14px;
    }

    .login-link a{
      color:#ff69b4;
      text-decoration:none;
      font-weight:600;
    }

    .login-link a:hover{
      text-decoration:underline;
    }

  </style>
</head>
<body>

  <div class="register-box">

    <h2>Create Account</h2>
    <p>Join Luxe Beauty and start shopping</p>

    <form>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="btn-register">Register</button>

    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </div>

</body>
</html>
